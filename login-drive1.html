<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Login </title>
  <style>
    body{font-family:sans-serif;display:grid;place-items:center;min-height:100vh;background:#f6f7fb;margin:0}
    .card{background:#fff;padding:24px;max-width:360px;width:100%;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 12px}
    label{display:block;margin:12px 0 6px}
    input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
    button{margin-top:16px;width:100%;padding:12px;border:0;border-radius:8px;background:#111;color:#fff;cursor:pointer}
    .error{color:#c62828;margin-top:8px;font-size:13px;display:none}
    .notice{background:#fff7e6;border:1px solid #ffe6b3;color:#8a6100;padding:10px;border-radius:10px;margin-bottom:12px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <div class="notice"> . <b> LOGIN DENGAN AKUN GOOGLE </b></div>
    <h1>Login Drive 1</h1>
    <form id="form">
      <label>Email</label>
      <input id="email" type="email" placeholder="nama@gmail.com" required />
      <label>Password </label>
      <input id="pass" type="password" placeholder=" harus yang bener ya" required />
      <button type="submit">Login</button>
      <div id="err" class="error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("pass");
    const errEl = document.getElementById("err");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = emailEl.value.trim().toLowerCase();
      const pass  = passEl.value;

      // <-- VALIDASI SEDERHANA (PAKE endsWith)
      if (!email.endsWith('@gmail.com')) {
        errEl.textContent = 'Email harus berakhiran @gmail.com';
        errEl.style.display = 'block';
        return;
      }

      sessionStorage.setItem("demoUser", email);
      window.location.href = "dashboard-drive1.html";
    });
  </script>
</body>
</html>
