<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Dashboard Drive </title>
  <style>
    body{font-family:sans-serif;padding:20px;background:#f6f7fb}
    .card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);max-width:800px;margin:auto}
    h1{margin-top:0}
    a{color:#0066cc;text-decoration:none}
    iframe{width:100%;height:500px;border:0;margin-top:16px;border-radius:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Selamat Datang!</h1>
    <p>Email kamu: <span id="user"></span></p>
    <p>Akses folder Google Drive di sini:</p>
    <a href="https://drive.google.com/drive/folders/17NU-6fHaTTcMFw-fOh9jqAOBtuLHiXdW?usp=sharing" target="_blank">
      Buka di tab baru
    </a>

    <iframe src="https://drive.google.com/embeddedfolderview?id=17NU-6fHaTTcMFw-fOh9jqAOBtuLHiXdW#grid"></iframe>
  </div>

  <script>
    const user = sessionStorage.getItem("demoUser");
    if (!user) {
      window.location.href = "login-drive1.html"; // balikin ke login
    } else {
      document.getElementById("user").textContent = user;
    }
  </script>
</body>
</html>
