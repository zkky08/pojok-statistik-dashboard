<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Unduh Materi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/confirm.css">
</head>
<body class="relative flex items-center justify-center min-h-screen">

  <!-- Background foto dengan overlay + blur -->
  <div class="absolute inset-0 w-full h-full">
    <img src="/assets/background/banten-2021-edit.jpg" alt="Background" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  </div>

    <!-- Kontainer utama -->
    <div class="relative z-10 bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md text-center animate-scale-in">

        <h1 class="text-2xl font-bold text-blue-900 mb-3">Konfirmasi Unduh</h1>
        <p class="text-gray-600 mb-6">Masukkan alamat email Anda untuk melanjutkan unduh materi.</p>

        <form id="confirmForm" class="space-y-4">
        <input 
            type="email" 
            id="emailInput" 
            placeholder="Alamat email" 
            class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" 
            required
        />
        <button 
            type="submit" 
            class="w-full py-3 rounded-lg font-semibold transition">
            Konfirmasi & Unduh
        </button>   
        </form>

        <!-- Progress bar -->
        <div id="progressContainer" class="hidden mt-6">
        <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
            <div id="progressBar" class="bg-yellow-400 h-3 w-0 transition-all duration-100 ease-linear"></div>
        </div>
        <p id="countdownText" class="mt-2 text-sm text-gray-700 font-medium"></p>
        </div>

        <a id="backBtn" class="inline-block mt-6 text-blue-700 hover:underline cursor-pointer">
        ⬅ Kembali ke Infografis
        </a>
    </div>

    <!-- Toast Notifikasi -->
    <div id="toast" 
        class="fixed top-6 left-1/2 -translate-x-1/2 
                bg-blue-900 text-white px-5 py-3 rounded-xl 
                shadow-lg opacity-0 translate-y-[-20px] 
                transition-all duration-500 text-sm font-medium z-50">
    </div>

    <!-- Popup Modal -->
    <div id="popup" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="popup-content bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full text-center">
        <h2 id="popupTitle" class="text-xl font-bold text-red-600 mb-3">Peringatan</h2>
        <p id="popupMessage" class="text-gray-700 mb-6">Pesan akan muncul di sini.</p>
        <button id="popupOkBtn"
                class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800 transition">
            OK
        </button>
        </div>
    </div>

  <script src="js/confirm.js"></script>
</body>
</html>
