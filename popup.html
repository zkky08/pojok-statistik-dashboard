<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akses Google Drive</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f9;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Overlay background */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Popup box */
    .popup {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      text-align: center;
      width: 350px;
      animation: fadeIn 0.3s ease-in-out;
    }

    h1 {
      margin-top: 0;
      color: #333;
      font-size: 20px;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #4285f4;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #3367d6;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>
  <!-- Overlay dengan popup -->
  <div class="overlay">
    <div class="popup">
      <h1>Login dengan Akun Google</h1>
      <p>Untuk mengakses file, silakan login dulu dengan akun Google kamu.</p>
      <a class="btn" href="https://drive.google.com/drive/folders/17NU-6fHaTTcMFw-fOh9jqAOBtuLHiXdW?usp=sharing" target="_blank">
        Login & Akses Drive
      </a>
    </div>
  </div>
</body>
</html>
