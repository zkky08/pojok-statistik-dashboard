<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak Kami - Universitas Bina Bangsa</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="kontak.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">

  <!-- Header -->
  <header class="bg-blue-900 text-white py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center px-4">
      <h1 class="text-xl font-bold">Universitas Bina Bangsa</h1>
      <nav>
        <ul class="flex gap-4 text-sm font-semibold">
          <li><a href="index.html" class="hover:text-yellow-400">Beranda</a></li>
          <li><a href="kontak.html" class="text-yellow-400">Kontak</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Lokasi Kami + Google Map -->
  <section class="bg-gray-100 py-8">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-4">Lokasi Kami</h2>
      <div id="map" class="w-full h-80 md:h-96 rounded-lg shadow-lg"></div>
    </div>
  </section>

  <!-- Kontak Section -->
  <section class="py-16">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 px-4">

      <!-- Info Kontak -->
      <div>
        <h3 class="text-xl font-semibold mb-4 text-blue-900">Info Hubungi Kami</h3>
        <ul class="space-y-3 text-gray-700">
          <li>
            <i class="fas fa-map-marker-alt text-blue-600 mr-2"></i>
            Jalan Raya Serang–Jakarta, KM 03 No 1B, Pakupatan, Serang, Banten 42124
          </li>
          <li>
            <i class="fas fa-phone text-blue-600 mr-2"></i>
            (0254) 220158
          </li>
          <li>
            <i class="fas fa-envelope text-blue-600 mr-2"></i>
            <a href="mailto:universitas@binabangsa.ac.id" class="hover:text-blue-800">
              universitas@binabangsa.ac.id
            </a>
          </li>
        </ul>

        <!-- Sosial Media -->
        <div class="mt-6 space-x-4">
          <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fab fa-instagram"></i></a>
        </div>
      </div>

      <!-- Form -->
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h3 class="text-xl font-semibold mb-4 text-blue-900">Kirim Pesan</h3>
        <form id="contactForm" novalidate class="space-y-4">
          <div>
            <input type="text" id="userName" placeholder="Nama Anda" required
              class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-500">
            <p id="nameError" class="text-red-600 text-sm hidden"></p>
          </div>
          <div>
            <input type="email" id="userEmail" placeholder="Email Anda" required
              class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-500">
            <p id="emailError" class="text-red-600 text-sm hidden"></p>
          </div>
          <div>
            <textarea id="userMessage" placeholder="Pesan Anda..." required
              class="w-full border p-3 rounded h-32 focus:ring-2 focus:ring-blue-500"></textarea>
            <p id="messageError" class="text-red-600 text-sm hidden"></p>
          </div>
          <button type="submit"
            class="w-full bg-blue-900 text-white py-2 rounded hover:bg-blue-800 transition">
            Kirim Pesan
          </button>
          <p id="successMessage" class="text-green-600 mt-2 hidden"></p>
        </form>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-blue-900 text-white py-6 text-center text-sm">
    <p>&copy; 2025 Universitas Bina Bangsa. All Rights Reserved.</p>
  </footer>

  <script src="kontak.js"></script>

  <!-- Google Maps API -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
  </script>
</body>
</html>
