<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Drive Gate</title>
    <style>
      body { font-family: Arial; padding: 12px; width: 360px; }
      #login, #content { display: none; }
      button { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; }
      .primary { background: #1a73e8; color: #fff; }
      .muted { color: #666; font-size: 12px; }
      ul { padding-left: 18px; max-height: 220px; overflow: auto; }
    </style>
  </head>
  <body>
    <h3>Akses Google Drive</h3>

    <div id="login">
      <p>Lu harus login Google dulu.</p>
      <button id="btnSignIn" class="primary">Sign in with Google</button>
      <p class="muted">Izin: baca file (read-only).</p>
    </div>

    <div id="content">
      <p>Udah login — 10 file teratas:</p>
      <ul id="fileList"></ul>
      <div style="margin-top:8px">
        <button id="btnRefresh">Refresh</button>
        <button id="btnLogout">Logout</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
